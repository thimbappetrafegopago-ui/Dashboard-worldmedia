<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Media — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f3f2f1;color:#252423;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:210px;background:#1b1a19;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sb-logo{padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,.07);cursor:pointer}
.sb-logo:hover .sb-logo-ph{border-color:rgba(240,165,0,.6)}
.sb-logo-wrap{display:flex;align-items:center;gap:9px}
.sb-logo-ph{width:36px;height:36px;border-radius:7px;background:#1a1400;border:1px solid rgba(240,165,0,.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#F0A500;flex-shrink:0;transition:border-color .15s}
.sb-logo-img{width:36px;height:36px;border-radius:7px;object-fit:cover;flex-shrink:0;display:none}
.sb-brand-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:#F0A500}
.sb-brand-sub{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.9px}
.sb-brand-hint{font-size:8px;color:rgba(255,255,255,.2);margin-top:1px}
.sb-section{padding:12px 0 4px}
.sb-lbl{font-size:9px;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:1px;padding:0 14px;margin-bottom:5px}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;color:rgba(255,255,255,.5);font-size:11px;font-weight:400;user-select:none}
.sb-item:hover{background:rgba(255,255,255,.05);color:#fff}
.sb-item.active{background:rgba(240,165,0,.1);color:#F0A500;border-left-color:#F0A500;font-weight:500}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-footer{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.07)}
.btn-new-sb{width:100%;padding:8px;font-size:11px;font-weight:600;background:#F0A500;color:#000;border:none;border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.btn-new-sb:hover{opacity:.88}

/* ── MAIN ── */
.main{margin-left:210px;display:flex;flex-direction:column;min-height:100vh}

/* top bar */
.topbar{background:#fff;border-bottom:1px solid #e1dfdd;padding:9px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-title{font-size:14px;font-weight:700;color:#252423;letter-spacing:.3px;text-transform:uppercase}
.tb-sub{font-size:10px;color:#605e5c;margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tb-btn{font-size:11px;padding:5px 11px;border-radius:3px;cursor:pointer;border:1px solid #8a8886;background:#fff;color:#252423;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.tb-btn:hover{background:#f3f2f1}
.tb-btn.gold{background:#F0A500;border-color:#F0A500;color:#000;font-weight:600}
.tb-btn.gold:hover{opacity:.9}

/* page header */
.page-hdr{background:#fff;border-bottom:1px solid #e1dfdd;padding:7px 18px;display:flex;align-items:center;justify-content:space-between}
.ph-title{font-size:12px;font-weight:700;color:#252423;letter-spacing:.5px;text-transform:uppercase}
.ph-right{display:flex;align-items:center;gap:8px}

/* client tabs */
.tabs-bar{background:#fff;border-bottom:2px solid #e1dfdd;padding:0 18px;overflow-x:auto;display:flex;gap:0}
.tab{font-size:11px;font-weight:500;padding:7px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:#605e5c;white-space:nowrap;transition:all .15s;background:transparent;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif}
.tab:hover{color:#252423;background:#f8f7f6}
.tab.active{color:#252423;border-bottom-color:#F0A500;font-weight:700}

/* content */
.content{padding:14px 18px;flex:1}

/* ── CARDS ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:11px}
.kpi-card{background:#fff;border:1px solid #e1dfdd;border-radius:3px;padding:12px 13px;position:relative;overflow:hidden}
.kpi-top{position:absolute;top:0;left:0;right:0;height:3px}
.kpi-lbl{font-size:10px;color:#605e5c;margin-bottom:3px}
.kpi-val{font-size:22px;font-weight:700;line-height:1;margin-bottom:5px}
.kpi-bar-row{display:flex;align-items:center;gap:6px}
.kpi-bar-bg{flex:1;height:4px;background:#edebe9;border-radius:2px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px}
.kpi-pct{font-size:9px;font-weight:600;white-space:nowrap}
.kpi-chg{font-size:10px;color:#107c10;margin-top:4px;font-weight:500}

/* service KPI cards */
.svc-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:11px}
.svc-kpi{background:#fff;border:1px solid #e1dfdd;border-radius:3px;padding:12px 13px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
.svc-kpi-icon{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.svc-kpi-info{}
.svc-kpi-lbl{font-size:10px;color:#605e5c;margin-bottom:2px}
.svc-kpi-val{font-size:18px;font-weight:700;line-height:1}
.svc-kpi-sub{font-size:9px;color:#605e5c;margin-top:2px}

/* link card */
.link-card{background:#fff;border:1px solid #e1dfdd;border-radius:3px;padding:11px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px}
.link-card-left{display:flex;align-items:center;gap:10px}
.link-avatar{width:38px;height:38px;border-radius:7px;object-fit:cover;flex-shrink:0}
.link-avatar-ph{width:38px;height:38px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;flex-shrink:0}
.link-info{}
.link-name{font-size:13px;font-weight:700;color:#252423}
.link-seg{font-size:10px;color:#605e5c}
.link-url-row{display:flex;align-items:center;gap:7px;margin-top:6px}
.link-url{font-size:10px;color:#605e5c;font-family:monospace;background:#f3f2f1;padding:3px 8px;border-radius:3px;border:1px solid #e1dfdd}
.btn-copy{font-size:10px;padding:4px 9px;border-radius:3px;border:1px solid #8a8886;background:#fff;cursor:pointer;color:#252423;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.btn-copy:hover{background:#f3f2f1}
.btn-copy.copied{color:#107c10;border-color:#107c10}

/* mid row */
.mid-row{display:grid;grid-template-columns:240px 1fr;gap:10px;margin-bottom:10px}
.chart-card{background:#fff;border:1px solid #e1dfdd;border-radius:3px;padding:13px}
.cc-title{font-size:11px;font-weight:700;color:#252423;margin-bottom:10px}
.legend-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:9px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:#605e5c}
.leg-dot{width:7px;height:7px;border-radius:50%}
.chart-wrap{position:relative;width:100%}
.h160{height:160px}
.h180{height:180px}
.h200{height:200px}

/* bottom monthly row */
.month-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:10px}
.month-card{background:#fff;border:1px solid #e1dfdd;border-radius:3px;padding:11px}
.mc-title{font-size:10px;font-weight:600;color:#252423;margin-bottom:3px}
.mc-sub{font-size:9px;color:#605e5c;margin-bottom:8px}
.mc-wrap{height:110px;position:relative}

/* services grid */
.svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:10px}
.svc-card{background:#fff;border:1px solid #e1dfdd;border-radius:3px;padding:12px}
.svc-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.svc-card-icon{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:2px;white-space:nowrap}
.badge-done{background:#dff6dd;color:#107c10}
.badge-progress{background:#fff4ce;color:#6f4e00}
.badge-review{background:#fce4d6;color:#a4262c}
.badge-scheduled{background:#e8e8f4;color:#4040a0}
.svc-card-name{font-size:12px;font-weight:600;color:#252423;margin-bottom:3px}
.svc-card-desc{font-size:10px;color:#605e5c;line-height:1.4}

/* extras */
.extras-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px}
.extra-card{background:#fff;border:1px solid #e1dfdd;border-radius:3px;padding:12px;display:flex;flex-direction:column;gap:6px}
.extra-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.extra-name{font-size:12px;font-weight:600;color:#252423}
.extra-desc{font-size:10px;color:#605e5c;line-height:1.4}
.extra-bottom{display:flex;align-items:center;justify-content:space-between}
.extra-date{font-size:9px;color:#605e5c}
.btn-del{font-size:9px;color:#a4262c;background:none;border:none;cursor:pointer;padding:0;font-family:'DM Sans',sans-serif}

/* identity panel */
.identity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.id-panel{background:#fff;border:1px solid #e1dfdd;border-radius:3px;padding:14px}
.id-panel-title{font-size:12px;font-weight:700;color:#252423;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.id-body{display:flex;gap:12px;align-items:flex-start}
.upload-zone{width:60px;height:60px;border-radius:8px;border:1px dashed #8a8886;background:#f3f2f1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;overflow:hidden;flex-shrink:0;position:relative}
.upload-zone:hover{background:#edebe9;border-color:#252423}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.color-section{flex:1;min-width:0}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.clr-field{display:flex;flex-direction:column;gap:3px;align-items:center}
.clr-field label{font-size:8px;color:#605e5c;text-transform:uppercase;letter-spacing:.3px}
.clr-swatch{width:32px;height:32px;border-radius:5px;border:1px solid #e1dfdd;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s}
.clr-swatch:hover{transform:scale(1.1)}
.clr-swatch input[type=color]{position:absolute;inset:-4px;opacity:0;cursor:pointer;width:calc(100%+8px);height:calc(100%+8px)}
.hex{font-size:8px;color:#605e5c;font-family:monospace}
.preset-row{display:flex;gap:6px;flex-wrap:wrap}
.preset-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:1px solid rgba(0,0,0,.1);transition:transform .15s}
.preset-dot:hover{transform:scale(1.2)}
.btn-sm{font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid #8a8886;background:#fff;cursor:pointer;color:#252423;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-sm:hover{background:#f3f2f1}
.btn-sm.danger{color:#a4262c}.btn-sm.danger:hover{border-color:#a4262c;background:#fce4d6}

/* modals */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-ov.hidden{display:none}
.modal{background:#fff;border-radius:4px;border:1px solid #e1dfdd;padding:22px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-title{font-size:15px;font-weight:700;color:#252423;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.field label{font-size:10px;color:#605e5c;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{font-family:'DM Sans',sans-serif;font-size:12px;color:#252423;background:#fff;border:1px solid #8a8886;border-radius:3px;padding:7px 10px;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#252423}
.field textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.btn-ok{padding:8px 18px;font-size:12px;font-weight:600;background:#252423;color:#fff;border:none;border-radius:3px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.btn-ok:hover{opacity:.88}
.btn-cancel{padding:8px 18px;font-size:12px;background:#fff;border:1px solid #8a8886;border-radius:3px;cursor:pointer;font-family:'DM Sans',sans-serif;color:#252423;transition:all .15s}
.btn-cancel:hover{background:#f3f2f1}
.modal-div{height:1px;background:#e1dfdd;margin:12px 0}
.modal-sec{font-size:10px;font-weight:700;color:#605e5c;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.two-col-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.empty-state{background:#fff;border:1px solid #e1dfdd;border-radius:3px;padding:32px;text-align:center;color:#605e5c;font-size:12px}

@media(max-width:960px){.kpi-row{grid-template-columns:repeat(3,1fr)}.svc-kpi-row{grid-template-columns:repeat(2,1fr)}.mid-row{grid-template-columns:1fr}.month-row{grid-template-columns:repeat(2,1fr)}.svc-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.sidebar{display:none}.main{margin-left:0}.kpi-row{grid-template-columns:repeat(2,1fr)}.svc-grid{grid-template-columns:1fr}.month-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ═══════════ SIDEBAR ═══════════ -->
<div class="sidebar">
  <div class="sb-logo" onclick="triggerAgencyLogo()" title="Clique para trocar logo">
    <div class="sb-logo-wrap">
      <img id="ag-logo-img" class="sb-logo-img" alt="">
      <div id="ag-logo-ph" class="sb-logo-ph">WM</div>
      <input type="file" id="ag-logo-file" accept="image/*" style="display:none" onchange="handleAgencyLogo(this)">
      <div>
        <div class="sb-brand-name">World Media</div>
        <div class="sb-brand-sub">Business Group</div>
        <div class="sb-brand-hint">↑ clique para trocar logo</div>
      </div>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-lbl">Páginas</div>
    <div class="sb-item active" id="nav-overview" onclick="setPage('overview',this)"><div class="sb-dot" style="background:#F0A500"></div>Visão Geral</div>
    <div class="sb-item" id="nav-services" onclick="setPage('services',this)"><div class="sb-dot" style="background:#1D9E75"></div>Serviços</div>
    <div class="sb-item" id="nav-extras" onclick="setPage('extras',this)"><div class="sb-dot" style="background:#378ADD"></div>Serviços Extras</div>
    <div class="sb-item" id="nav-identity" onclick="setPage('identity',this)"><div class="sb-dot" style="background:#D4537E"></div>Identidade Visual</div>
  </div>

  <div class="sb-section">
    <div class="sb-lbl">Clientes</div>
    <div id="sb-clients"></div>
  </div>

  <div class="sb-footer">
    <button class="btn-new-sb" onclick="openNewClientModal()">+ Novo cliente</button>
  </div>
</div>

<!-- ═══════════ MAIN ═══════════ -->
<div class="main">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <div class="tb-title" id="tb-title">RELATÓRIO DE MARKETING DIGITAL</div>
      <div class="tb-sub" id="tb-sub">Visão Geral</div>
    </div>
    <div class="tb-right">
      <select style="font-size:11px;padding:5px 8px;border:1px solid #8a8886;border-radius:3px;background:#fff;color:#252423;font-family:'DM Sans',sans-serif;cursor:pointer">
        <option>Últimos 30 dias</option>
        <option>Últimos 7 dias</option>
        <option>Últimos 90 dias</option>
      </select>
      <button class="tb-btn" onclick="openExtraModal()">+ Serviço Extra</button>
      <button class="tb-btn gold" onclick="openEditClientModal()">✎ Editar cliente</button>
    </div>
  </div>

  <!-- PAGE HEADER -->
  <div class="page-hdr">
    <div class="ph-title" id="ph-title">ANÁLISE COMPLETA DE CAMPANHAS</div>
    <div class="ph-right" id="ph-right"></div>
  </div>

  <!-- CLIENT TABS -->
  <div class="tabs-bar" id="tabs-bar"></div>

  <!-- CONTENT -->
  <div class="content" id="content"></div>
</div>

<!-- ═══════════ MODALS ═══════════ -->

<!-- NEW CLIENT -->
<div class="modal-ov hidden" id="newClientModal">
  <div class="modal">
    <div class="modal-title">Novo cliente</div>
    <div class="field"><label>Nome do negócio *</label><input id="nc-name" type="text" placeholder="Ex: Pizzaria Dom Gourmet"></div>
    <div class="field"><label>Segmento</label><input id="nc-seg" type="text" placeholder="Ex: Gastronomia, Moda, Saúde..."></div>
    <div class="modal-div"></div>
    <div class="modal-sec">Métricas Meta Ads</div>
    <div class="two-col-fields">
      <div class="field"><label>Alcance</label><input id="nc-alcance" type="text" placeholder="Ex: 48.320"></div>
      <div class="field"><label>Impressões</label><input id="nc-impressoes" type="text" placeholder="Ex: 142.880"></div>
      <div class="field"><label>Conversas iniciadas</label><input id="nc-conversas" type="text" placeholder="Ex: 317"></div>
      <div class="field"><label>Cliques</label><input id="nc-cliques" type="text" placeholder="Ex: 4.210"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('newClientModal')">Cancelar</button>
      <button class="btn-ok" onclick="saveNewClient()">Criar cliente</button>
    </div>
  </div>
</div>

<!-- EDIT CLIENT -->
<div class="modal-ov hidden" id="editClientModal">
  <div class="modal">
    <div class="modal-title">Editar cliente</div>
    <input type="hidden" id="ec-id">
    <div class="field"><label>Nome do negócio *</label><input id="ec-name" type="text"></div>
    <div class="field"><label>Segmento</label><input id="ec-seg" type="text"></div>
    <div class="modal-div"></div>
    <div class="modal-sec">Métricas Meta Ads</div>
    <div class="two-col-fields">
      <div class="field"><label>Alcance</label><input id="ec-alcance" type="text"></div>
      <div class="field"><label>Var. alcance (ex: ↑ 12%)</label><input id="ec-chgA" type="text"></div>
      <div class="field"><label>Impressões</label><input id="ec-impressoes" type="text"></div>
      <div class="field"><label>Var. impressões</label><input id="ec-chgI" type="text"></div>
      <div class="field"><label>Conversas iniciadas</label><input id="ec-conversas" type="text"></div>
      <div class="field"><label>Var. conversas</label><input id="ec-chgC" type="text"></div>
      <div class="field"><label>Cliques</label><input id="ec-cliques" type="text"></div>
      <div class="field"><label>Var. cliques</label><input id="ec-chgK" type="text"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('editClientModal')">Cancelar</button>
      <button class="btn-ok" onclick="saveEditClient()">Salvar</button>
    </div>
  </div>
</div>

<!-- EXTRA SERVICE -->
<div class="modal-ov hidden" id="extraModal">
  <div class="modal">
    <div class="modal-title">Serviço extra</div>
    <div class="field"><label>Cliente</label><select id="fm-client"></select></div>
    <div class="field"><label>Nome do serviço *</label><input id="fm-name" type="text" placeholder="Ex: Edição de Reels, Google Ads..."></div>
    <div class="field"><label>Descrição</label><textarea id="fm-desc" placeholder="Descreva o serviço..."></textarea></div>
    <div class="field"><label>Status</label>
      <select id="fm-status"><option>Em andamento</option><option>Concluído</option><option>Aguardando aprovação</option><option>Entregue</option></select>
    </div>
    <div class="field"><label>Data de entrega (opcional)</label><input id="fm-date" type="date"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('extraModal')">Cancelar</button>
      <button class="btn-ok" onclick="saveExtra()">Salvar</button>
    </div>
  </div>
</div>

<script>
/* ═══ DATA ═══ */
const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const statusCls={Concluído:'badge-done','Em andamento':'badge-progress','Aguardando aprovação':'badge-review',Entregue:'badge-done',Agendado:'badge-scheduled'};
const colorLabels={primary:'Principal',secondary:'Fundo',accent:'Destaque',text:'Texto',cardBg:'Card'};
const PRESETS=['#F0A500','#1D9E75','#378ADD','#D4537E','#7F77DD','#D85A30','#252423','#E24B4A'];

let currentClient='sabor-arte';
let currentPage='overview';
let charts={};
let nextCID=5, nextEID=3;

/* ═══ HELPERS ═══ */
const a=(hex,op)=>{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${op})`;};
const fmt=d=>{if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;};
const slug=n=>n.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
const initials=n=>n.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
const destroyCharts=()=>{Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};};

/* ═══ AGENCY LOGO ═══ */
function triggerAgencyLogo(){document.getElementById('ag-logo-file').click();}
function handleAgencyLogo(input){
  if(!input.files[0])return;
  const fr=new FileReader();
  fr.onload=e=>{
    document.getElementById('ag-logo-img').src=e.target.result;
    document.getElementById('ag-logo-img').style.display='block';
    document.getElementById('ag-logo-ph').style.display='none';
  };
  fr.readAsDataURL(input.files[0]);
}

/* ═══ NAVIGATION ═══ */
function setPage(page,el){
  currentPage=page;
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  if(el)el.classList.add('active');
  const titles={overview:'ANÁLISE COMPLETA DE CAMPANHAS',services:'SERVIÇOS PRESTADOS',extras:'SERVIÇOS ADICIONAIS',identity:'IDENTIDADE VISUAL POR CLIENTE'};
  document.getElementById('ph-title').textContent=titles[page]||'';
  document.getElementById('tb-sub').textContent={overview:'Visão Geral',services:'Serviços',extras:'Serviços Extras',identity:'Identidade Visual'}[page]||'';
  renderContent();
}

function selectClient(id){
  currentClient=id;
  buildTabs();
  buildSBClients();
  renderContent();
}

/* ═══ BUILD NAV ═══ */
function buildSBClients(){
  document.getElementById('sb-clients').innerHTML=CLIENTS.map(c=>`
    <div class="sb-item${c.id===currentClient?' active':''}" onclick="selectClient('${c.id}')" style="${c.id===currentClient?`border-left-color:${c.brand.primary};color:${c.brand.primary}`:''}">
      <div class="sb-dot" style="background:${c.brand.primary}"></div>
      ${c.name.split(' ').slice(0,3).join(' ')}
    </div>`).join('');
}

function buildTabs(){
  document.getElementById('tabs-bar').innerHTML=CLIENTS.map(c=>`
    <button class="tab${c.id===currentClient?' active':''}" onclick="selectClient('${c.id}')" style="${c.id===currentClient?`border-bottom-color:${c.brand.primary}`:''}">
      ${c.name}
    </button>`).join('');
}

/* ═══ RENDER ═══ */
function renderContent(){
  buildSBClients();buildTabs();
  destroyCharts();
  const c=CLIENTS.find(x=>x.id===currentClient);
  if(!c)return;
  const el=document.getElementById('content');
  if(currentPage==='overview')renderOverview(c,el);
  else if(currentPage==='services')renderServices(c,el);
  else if(currentPage==='extras')renderExtras(c,el);
  else if(currentPage==='identity')renderIdentity(el);
}

/* ═══ BRAND ACTIONS ═══ */
function handleClientLogo(id,input){
  if(!input.files[0])return;
  const fr=new FileReader();
  fr.onload=e=>{CLIENTS.find(x=>x.id===id).brand.logo=e.target.result;renderContent();};
  fr.readAsDataURL(input.files[0]);
}
function removeLogo(id){CLIENTS.find(x=>x.id===id).brand.logo=null;renderContent();}
function updateColor(id,key,val){CLIENTS.find(x=>x.id===id).brand[key]=val;renderContent();}
function applyPreset(id,primary){
  const c=CLIENTS.find(x=>x.id===id);
  const r=parseInt(primary.slice(1,3),16),g=parseInt(primary.slice(3,5),16),b2=parseInt(primary.slice(5,7),16);
  const dk=(v,p)=>Math.max(0,Math.round(v*(1-p)));
  c.brand.primary=primary;
  c.brand.accent=`#${dk(r,.2).toString(16).padStart(2,'0')}${dk(g,.2).toString(16).padStart(2,'0')}${dk(b2,.2).toString(16).padStart(2,'0')}`;
  c.brand.secondary=`#${Math.round(r*.05).toString(16).padStart(2,'0')}${Math.round(g*.05).toString(16).padStart(2,'0')}${Math.round(b2*.05).toString(16).padStart(2,'0')}`;
  c.brand.cardBg=`#${Math.round(r*.08).toString(16).padStart(2,'0')}${Math.round(g*.08).toString(16).padStart(2,'0')}${Math.round(b2*.08).toString(16).padStart(2,'0')}`;
  c.brand.text=(r*.299+g*.587+b2*.114)<128?'#FFFFFF':'#111111';
  renderContent();
}
const BRAND_DEFAULTS={'sabor-arte':{primary:'#E88A00',secondary:'#0f0d00',accent:'#B87800',text:'#F5F0E8',cardBg:'#181500',logo:null},'vida-plena':{primary:'#1D9E75',secondary:'#001a12',accent:'#0F6E56',text:'#F0FAF5',cardBg:'#001a10',logo:null},'modaflex':{primary:'#D4537E',secondary:'#1a0010',accent:'#993556',text:'#FFF0F5',cardBg:'#18000e',logo:null},'fitpower':{primary:'#378ADD',secondary:'#001020',accent:'#185FA5',text:'#EEF5FF',cardBg:'#001528',logo:null}};
function resetBrand(id){const c=CLIENTS.find(x=>x.id===id);if(BRAND_DEFAULTS[id])c.brand={...BRAND_DEFAULTS[id]};renderContent();}
function deleteClient(id){if(!confirm('Excluir este cliente?'))return;CLIENTS=CLIENTS.filter(c=>c.id!==id);extras=extras.filter(e=>e.clientId!==id);if(currentClient===id&&CLIENTS.length)currentClient=CLIENTS[0].id;renderContent();}

      <div class="cv-kpi-row">
        <div class="cv-kpi"><div class="cv-kpi-lbl">Alcance</div><div class="cv-kpi-val">${c.alcance}</div><div class="cv-kpi-chg">${c.chgA} vs período anterior</div></div>
        <div class="cv-kpi"><div class="cv-kpi-lbl">Impressões</div><div class="cv-kpi-val">${c.impressoes}</div><div class="cv-kpi-chg">${c.chgI} vs período anterior</div></div>
        <div class="cv-kpi"><div class="cv-kpi-lbl">Conversas Iniciadas</div><div class="cv-kpi-val">${c.conversas}</div><div class="cv-kpi-chg">${c.chgC} vs período anterior</div></div>
        <div class="cv-kpi"><div class="cv-kpi-lbl">Cliques no Link</div><div class="cv-kpi-val">${c.cliques}</div><div class="cv-kpi-chg">${c.chgK} vs período anterior</div></div>
      </div>
    </div>

    <!-- DONUT + FUNNEL -->
    <div class="cv-two">
      <div class="cv-card">
        <div class="cv-card-title">Distribuição por Canal</div>
        <div style="position:relative;height:150px"><canvas id="cv-donut"></canvas></div>
        <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:10px">
          ${['Meta Ads','Social Org.','WhatsApp','E-mail'].map((l,i)=>{const cols=[b.primary,'#1D9E75','#378ADD','#D4537E'];return`<div style="display:flex;align-items:center;gap:4px;font-size:9px;color:${alpha2(b.text,.6)}"><div style="width:7px;height:7px;border-radius:50%;background:${cols[i]}"></div>${l}</div>`;}).join('')}
        </div>
      </div>
      <div class="cv-card">
        <div class="cv-card-title">Funil de Conversão</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${[{l:'Impressões',v:c.impressoes,pct:100},{l:'Alcance',v:c.alcance,pct:34},{l:'Cliques',v:c.cliques,pct:9},{l:'Conversas',v:c.conversas,pct:2}].map((f,i)=>{
            const cols=[alpha2(b.primary,.3),b.primary,alpha2(b.accent,.8),'#1D9E75'];
            return`<div class="cv-funnel-row"><div class="cv-funnel-lbl">${f.l}</div><div class="cv-funnel-bg"><div class="cv-funnel-fill" style="width:${f.pct}%;background:${cols[i]}"></div></div><div class="cv-funnel-num">${f.v}</div></div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- SERVICES -->
    <div>
      <div class="cv-sec-lbl">Serviços desta semana</div>
      <div class="cv-svc-grid">
        ${c.services.map(s=>{
          const bc=s.l==='Concluído'?'cv-badge-done':s.l==='Em andamento'?'cv-badge-prog':s.l==='Agendado'?'cv-badge-sched':'cv-badge-rev';
          return`<div class="cv-svc"><div class="cv-svc-top"><div style="font-size:16px">${s.icon}</div><div class="cv-badge ${bc}">${s.l}</div></div><div class="cv-svc-name">${s.n}</div><div class="cv-svc-desc">${s.d}</div></div>`;
        }).join('')}
      </div>
    </div>

    <!-- EXTRAS -->
    ${cExtras.length?`
    <div>
      <div class="cv-sec-lbl">Serviços adicionais (${cExtras.length})</div>
      <div class="cv-extras-grid">
        ${cExtras.map(e=>{
          const bc=e.status==='Concluído'?'cv-badge-done':e.status==='Em andamento'?'cv-badge-prog':e.status==='Agendado'?'cv-badge-sched':'cv-badge-rev';
          return`<div class="cv-ext-item"><div><div class="cv-ext-name">${e.name}</div><div class="cv-ext-desc">${e.desc}</div>${e.date?`<div class="cv-ext-date">Entrega: ${fmt2(e.date)}</div>`:''}</div><div class="cv-badge ${bc}" style="flex-shrink:0">${e.status}</div></div>`;
        }).join('')}
      </div>
    </div>`:''}

    <div class="cv-foot">World Media Business Group · Atualizado hoje</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"><\/script>
  <script>
    const dColors=['${b.primary}','#1D9E75','#378ADD','#D4537E'];
    new Chart(document.getElementById('cv-donut'),{
      type:'doughnut',
      data:{labels:['Meta Ads','Social Org.','WhatsApp','E-mail'],datasets:[{data:${JSON.stringify(c.donut)},backgroundColor:dColors,borderWidth:2,borderColor:'${b.cardBg}',hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:'65%'}
    });
  <\/script>`;
}

/* ═══ INIT — detect client mode ═══ */
const clientParam=getClientParam();
if(clientParam){
  // CLIENT VIEW: hide agency UI, show client dashboard
  document.querySelector('.sidebar').style.display='none';
  document.querySelector('.main').style.marginLeft='0';
  buildClientView(clientParam);
} else {
  // AGENCY VIEW: normal dashboard
  renderContent();
}
</script>
</body>
</html>
